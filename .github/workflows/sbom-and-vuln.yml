name: SBOM and vulnerability scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  syft-grype:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json

      - name: Vulnerability scan (Grype)
        id: grype
        uses: anchore/scan-action@v3
        with:
          path: .
          fail-build: false
          severity-cutoff: medium
          output-format: sarif

      - name: Upload Grype SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-sarif
          path: ${{ steps.grype.outputs.sarif }}

      - name: Comment summary on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let counts = { critical: 0, high: 0, medium: 0, low: 0 };
            try {
              const sarif = JSON.parse(fs.readFileSync('${{ steps.grype.outputs.sarif }}', 'utf8'));
              for (const run of (sarif.runs || [])) {
                for (const r of (run.results || [])) {
                  const sev = (r.level || 'note').toLowerCase();
                  if (sev === 'error') counts.high++;
                  else if (sev === 'warning') counts.medium++;
                  else counts.low++;
                }
              }
            } catch (e) {}
            const total = counts.critical + counts.high + counts.medium + counts.low;
            const body =
              `## SBOM + Grype\n\n` +
              `**SBOM:** CycloneDX JSON generated and uploaded as artifact.\n\n` +
              `**Vulnerabilities:** 🔴 ${counts.critical + counts.high} high+ · 🟡 ${counts.medium} medium · ⚫ ${counts.low} low\n\n` +
              (counts.critical + counts.high > 0
                ? `🔴 **${counts.critical + counts.high} high-or-critical finding${counts.critical+counts.high===1?'':'s'}**`
                : `✅ No high or critical findings`) +
              `\n\n[Download artifacts](${context.payload.repository.html_url}/actions/runs/${context.runId}#artifacts)`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
