name: DAST (ZAP baseline)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  zap:
    runs-on: ubuntu-latest
    env:
      TARGET_PORT: 8000
      TARGET_URL: http://host.docker.internal:8000
    steps:
      - uses: actions/checkout@v4

      - name: Serve static site
        run: |
          nohup python3 -m http.server "${{ env.TARGET_PORT }}" > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: |
          for i in {1..20}; do
            if curl -fsS "http://localhost:${{ env.TARGET_PORT }}/" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat server.log
          exit 1

      - name: ZAP baseline scan
        run: |
          mkdir -p zap-reports && chmod 777 zap-reports
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -v "$(pwd)/zap-reports:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "${{ env.TARGET_URL }}" \
              -r baseline-report.html \
              -J baseline-report.json \
              -d -I || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: zap-reports/

      - name: Comment summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let counts = { High: 0, Medium: 0, Low: 0, Informational: 0 };
            try {
              const r = JSON.parse(fs.readFileSync('zap-reports/baseline-report.json', 'utf8'));
              for (const a of (r.site?.[0]?.alerts || [])) {
                const sev = ({ '3':'High','2':'Medium','1':'Low','0':'Informational' })[a.riskcode] || 'Unknown';
                const n = a.instances?.length || 0;
                if (counts.hasOwnProperty(sev)) counts[sev] += n;
              }
            } catch (e) {
              counts = null;
            }
            const body = counts
              ? `## ZAP DAST\n\n**Baseline:** 🔴 ${counts.High} | 🟡 ${counts.Medium} | ⚫ ${counts.Low} | 🟦 ${counts.Informational}\n\n` +
                (counts.High > 0
                  ? `🔴 **${counts.High} high-risk finding${counts.High===1?'':'s'}**`
                  : counts.Medium > 0
                  ? `🟡 **${counts.Medium} medium-risk finding${counts.Medium===1?'':'s'}**`
                  : `✅ No high or medium findings`) +
                `\n\n[Download reports](${context.payload.repository.html_url}/actions/runs/${context.runId}#artifacts)`
              : `## ZAP DAST\n\n⚠️ Scan failed; see workflow logs.`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
