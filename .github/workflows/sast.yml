name: SAST (Semgrep)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep ci --config=p/ci --config=p/javascript --json --output=semgrep.json || true

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.json

      - name: Comment summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('semgrep.json', 'utf8'));
            const counts = { ERROR: 0, WARNING: 0, INFO: 0 };
            for (const r of (report.results || [])) {
              const sev = (r.extra?.severity || 'INFO').toUpperCase();
              if (counts.hasOwnProperty(sev)) counts[sev]++;
            }
            const body =
              `## Semgrep SAST\n\n` +
              `**Findings:** 🔴 ${counts.ERROR} error · 🟡 ${counts.WARNING} warning · 🟦 ${counts.INFO} info\n\n` +
              (counts.ERROR > 0
                ? `🔴 **${counts.ERROR} error-severity finding${counts.ERROR === 1 ? '' : 's'}**`
                : `✅ No error-severity findings`) +
              `\n\n[View report artifact](${context.payload.repository.html_url}/actions/runs/${context.runId}#artifacts)`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
