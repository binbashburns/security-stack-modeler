<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Stack Modeler</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="splash" class="splash" role="dialog" aria-labelledby="splash-title" aria-modal="true" hidden>
  <div class="splash-card">
    <h1 id="splash-title">Security Stack Modeler</h1>
    <p class="splash-tagline">Pick tools. See budget. Export the plan.</p>

    <ul class="splash-tabs">
      <li><strong>Scenario</strong> &middot; pick a tool per capability</li>
      <li><strong>Coverage</strong> &middot; map controls to your selections</li>
      <li><strong>Pipeline</strong> &middot; track DevSecOps maturity</li>
    </ul>

    <button id="splash-enter" class="splash-enter" type="button">Start</button>
    <label class="splash-remember">
      <input type="checkbox" id="splash-remember-me" checked> Skip this next time
    </label>
  </div>
</div>

<header class="topbar">
  <div class="title-block">
    <h1>Security Stack Modeler</h1>
    <p class="subtitle">Pick a tool per capability, get a Digital System Security Plan</p>
  </div>
  <div class="zone-cards" role="tablist">
    <button class="zone-card scenario active" data-mode="scenario" role="tab" aria-selected="true" type="button">
      <div class="zone-label">Scenario</div>
      <div class="zone-detail">Pick solutions, live cost</div>
    </button>
    <button class="zone-card coverage" data-mode="coverage" role="tab" aria-selected="false" type="button">
      <div class="zone-label">Coverage</div>
      <div class="zone-detail">Controls × capabilities</div>
    </button>
    <button class="zone-card pipeline" data-mode="pipeline" role="tab" aria-selected="false" type="button">
      <div class="zone-label">Pipeline</div>
      <div class="zone-detail">DevSecOps SDLC ribbon</div>
    </button>
  </div>
  <button id="theme-toggle" class="theme-toggle" type="button" title="Toggle light / dark theme" aria-label="Toggle theme">
    <span class="theme-toggle-icon" aria-hidden="true">◐</span>
  </button>
  <a class="contribute-link" href="https://github.com/binbashburns/security-stack-modeler" target="_blank" rel="noopener noreferrer" title="Contribute on GitHub" aria-label="Contribute on GitHub">
    <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
  </a>
</header>

<main id="main" class="layout"></main>

<div id="modal-root"></div>
<section id="print-summary" class="print-only" hidden></section>

<script src="data.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
